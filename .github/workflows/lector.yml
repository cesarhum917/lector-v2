name: Lector
on:
  schedule:
    - cron: '0 12 * * *'   # 6:00 AM hora del centro de Mexico (UTC-6)
  workflow_dispatch:        # boton para correrlo a mano
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Pruebas del motor
        run: node test_motor.js
      - name: Generar datos
        run: python lector.py --dias 3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Publicar
        run: |
          git config user.name  "lector-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A datos.json lector.db
          git diff --staged --quiet || git commit -m "Actualiza datos $(date -u +%F)"
          git push
