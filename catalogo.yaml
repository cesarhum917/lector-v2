  - id: ia
    nombre: "Inteligencia Artificial"
    color: "#7aa2f7"
  - id: negocios
    nombre: "Negocios y ecommerce"
    color: "#e0a83a"
  - id: mexico
    nombre: "México"
    color: "#9ece6a"
  - id: local
    nombre: "Toluca / EdoMex"
    color: "#73daca"
  - id: internacional
    nombre: "Internacional"
    color: "#bb9af7"
  - id: alimentos
    nombre: "Miel y alimentos"
    color: "#e0af68"
  - id: cine
    nombre: "Cine"
    color: "#f7768e"
  - id: libros
    nombre: "Libros"
    color: "#c0caf5"
  - id: ideas
    nombre: "Ideas y long-form"
    color: "#ff9e64"
  - id: diseno
    nombre: "Diseño y empaque"
    color: "#ff9ecd"
  - id: comercio_exterior
    nombre: "Comercio exterior"
    color: "#2ac3de"
  - id: apicola
