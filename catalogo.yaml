    sitio: "https://news.google.com"
    temas: [alimentos]
    tipo: agregador
    idioma: es
    region: mx
    volumen: medio
    resumir: true
    porque: "Rastrea el fraude de miel en toda la prensa. Ninguna fuente única lo cubre."

  - id: gn_regulacion
    nombre: "Regulación alimentaria MX"
    feed: "https://news.google.com/rss/search?q=(SENASICA+OR+COFEPRIS+OR+%22NOM-051%22+OR+etiquetado)+alimentos&hl=es-419&gl=MX&ceid=MX:es-419"
