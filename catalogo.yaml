    feed: "https://news.google.com/rss/search?q=site:aristeguinoticias.com&hl=es-419&gl=MX&ceid=MX:es-419"
    sitio: "https://aristeguinoticias.com"
    temas: [mexico]
    tipo: medio
    idioma: es
    region: mx
    postura: critica-gobierno
    volumen: alto
    resumir: true
    max: 10
    porque: "Investigación y entrevista larga. Rompe historias que otros no tocan."

  - id: el_pais_mx
    nombre: "El País (México)"
    sitio: "https://elpais.com/mexico/"
    temas: [mexico]
    tipo: medio
    idioma: es
    region: mx
    postura: centro-izquierda
    volumen: alto
    resumir: true
    max: 10
    porque: "Mirada extranjera sobre México. Ve cosas que la prensa local normaliza."

  # ==========================================================
  # LOCAL — Toluca / EdoMex
  # ==========================================================
  - id: adnoticias
    nombre: "AD Noticias"
    sitio: "https://adnoticias.mx"
    temas: [local]
    tipo: medio
    idioma: es
    region: mx
    volumen: medio
    resumir: true
    porque: "Agencia local de Toluca. Cubre lo municipal que ningún nacional toca."

  - id: digitalmex
    nombre: "DigitalMEX"
    sitio: "https://www.digitalmex.mx"
    temas: [local]
    tipo: medio
    idioma: es
    region: mx
