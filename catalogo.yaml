# ============================================================
# catalogo.yaml — El catálogo ES el producto.
# Reglas de curaduría: ver CATALOGO.md. No agregues nada sin leerlo.
#
# REGLA DURA: toda fuente lleva "porque". Si no puedes escribir qué aporta
# que ninguna otra aporte, la fuente no entra.
# ============================================================

