    color: "#e8d477"
  - id: musica
    nombre: "Música y producción"
    color: "#9d7cd8"

# ------------------------------------------------------------
# EJE: financiamiento — la respuesta honesta a "medios objetivos".
# NO existe el medio "independiente" en abstracto: existe el medio
# independiente RESPECTO A un poder concreto. La pregunta util no es
# "¿es objetivo?" sino "¿quien le paga, y a quien NO puede criticar
# por eso?". Razonamiento completo en CATALOGO.md.
# ------------------------------------------------------------
financiamiento:
  - id: lectores
    nombre: "Lectores / sin fines de lucro"
    nota: "No depende de anunciantes ni de acceso oficial. El sesgo es editorial, no comercial."
  - id: publico_extranjero
    nombre: "Público extranjero"
    nota: "Financiado por OTRO estado. Capturado por un poder que a ti no te afecta. Útil justo por eso."
  - id: fundacion
    nombre: "Fundación / filantropía"
    nota: "Sin presión comercial. Revisar la agenda del donante."
  - id: anuncios
    nombre: "Publicidad"
    nota: "Presión comercial. Difícil que critique a sus anunciantes."
  - id: estatal_local
    nombre: "Estatal del país que cubre"
    nota: "Capturado respecto a lo que más te importa. Úsalo como fuente primaria, no como crítica."
  - id: corporativo
    nombre: "Grupo corporativo"
    nota: "Depende del dueño. Puede ser bueno, pero nunca criticará a su matriz."

# ------------------------------------------------------------
# PAQUETES DE ARRANQUE
# Un paquete es una CONSULTA sobre el catálogo, no una lista fija.
# Así, al agregar una fuente nueva, entra sola a quien eligió ese paquete.
# ------------------------------------------------------------
paquetes:
  - id: ia_sin_ruido
    nombre: "IA sin ruido"
    descripcion: "Las voces que van meses adelante de la prensa. Cero notas de lanzamiento."
    temas: [ia]
    tipos: [voz, primaria]

  - id: ia_completo
    nombre: "IA completa"
    descripcion: "Voces, fuentes primarias y la cobertura de prensa."
    temas: [ia]
    tipos: [voz, primaria, medio]

  - id: mexico_plural
    nombre: "México plural"
    descripcion: "Cobertura nacional con distintas líneas editoriales, a propósito."
    temas: [mexico]
    tipos: [medio, agregador]

  - id: leer_despacio
    nombre: "Leer despacio"
    descripcion: "Ensayo, crónica e investigación. Poco volumen, alta señal. Sin resumir."
    temas: [ideas, cine, libros]
    tipos: [longform]

  - id: vender_en_amazon
    nombre: "Vender en Amazon"
    descripcion: "Cambios de política, tarifas y ecommerce en México."
    temas: [negocios]
    tipos: [medio, voz, video, alerta, podcast]

  - id: internacional
    nombre: "Internacional"
    descripcion: "El mundo con miradas cruzadas: públicos extranjeros, investigación independiente y agencias sin intereses locales."
    temas: [internacional]
    tipos: [medio, agregador, alerta]

  # Un paquete tambien puede filtrar por financiamiento o idioma.
  # Si omite temas o tipos, significa "cualquiera".
  - id: prensa_no_capturada
    nombre: "Prensa no capturada"
    descripcion: "Medios que no dependen de anunciantes ni del poder que cubren: lectores, fundaciones o públicos extranjeros."
    tipos: [medio]
    financiamiento: [lectores, publico_extranjero, fundacion]

  - id: cine_en_espanol
    nombre: "Cine en español"
    descripcion: "Crítica y festivales en tu idioma. Cero cartelera."
    temas: [cine]
    idioma: es

  - id: escuchar
    nombre: "Escuchar"
    descripcion: "Todos los podcasts del catálogo, de crónica a negocios."
    tipos: [podcast]

  - id: ver
    nombre: "Ver"
    descripcion: "Video-ensayo y análisis. YouTube sin el algoritmo de YouTube."
    tipos: [video]

