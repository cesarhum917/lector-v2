# ============================================================
# catalogo.yaml — El catálogo ES el producto.
# Reglas de curaduría: ver CATALOGO.md. No agregues nada sin leerlo.
#
# REGLA DURA: toda fuente lleva "porque". Si no puedes escribir qué aporta
# que ninguna otra aporte, la fuente no entra.
# ============================================================

temas:
  - id: ia
    nombre: "Inteligencia Artificial"
    color: "#7aa2f7"
  - id: negocios
    nombre: "Negocios y ecommerce"
    color: "#e0a83a"
  - id: mexico
    nombre: "México"
    color: "#9ece6a"
  - id: local
    nombre: "Toluca / EdoMex"
    color: "#73daca"
  - id: internacional
    nombre: "Internacional"
    color: "#bb9af7"
  - id: alimentos
    nombre: "Miel y alimentos"
    color: "#e0af68"
  - id: cine
    nombre: "Cine"
    color: "#f7768e"
  - id: libros
    nombre: "Libros"
    color: "#c0caf5"
  - id: ideas
    nombre: "Ideas y long-form"
    color: "#ff9e64"

# ------------------------------------------------------------
# PAQUETES DE ARRANQUE
# Un paquete es una CONSULTA sobre el catálogo, no una lista fija.
# Así, al agregar una fuente nueva, entra sola a quien eligió ese paquete.
# ------------------------------------------------------------
paquetes:
  - id: ia_sin_ruido
    nombre: "IA sin ruido"
    descripcion: "Las voces que van meses adelante de la prensa. Cero notas de lanzamiento."
    temas: [ia]
    tipos: [voz, primaria]

  - id: ia_completo
    nombre: "IA completa"
    descripcion: "Voces, fuentes primarias y la cobertura de prensa."
    temas: [ia]
    tipos: [voz, primaria, medio]

  - id: mexico_plural
    nombre: "México plural"
    descripcion: "Cobertura nacional con distintas líneas editoriales, a propósito."
    temas: [mexico]
    tipos: [medio, agregador]

  - id: leer_despacio
    nombre: "Leer despacio"
    descripcion: "Ensayo, crónica e investigación. Poco volumen, alta señal. Sin resumir."
    temas: [ideas, cine, libros]
    tipos: [longform]

  - id: vender_en_amazon
    nombre: "Vender en Amazon"
    descripcion: "Cambios de política, tarifas y ecommerce en México."
    temas: [negocios]
    tipos: [medio, voz, video]

fuentes:

  # ==========================================================
  # IA — aquí las VOCES valen más que los MEDIOS. Es el caso
  # que motivó todo el eje "tipo de fuente".
  # ==========================================================
  - id: simon_willison
    nombre: "Simon Willison"
    feed: "https://simonwillison.net/atom/everything/"
    sitio: "https://simonwillison.net"
    temas: [ia]
    tipo: voz
    idioma: en
    volumen: medio
    resumir: true
    max: 15
    porque: "Prueba las herramientas antes que nadie y documenta lo que falla, no lo que promete el marketing."

  - id: one_useful_thing
    nombre: "One Useful Thing"
    feed: "https://www.oneusefulthing.org/feed"
    sitio: "https://www.oneusefulthing.org"
    temas: [ia]
    tipo: voz
    idioma: en
    volumen: bajo
    resumir: true
    porque: "Ethan Mollick traduce la investigación a uso real en el trabajo. Nadie más hace ese puente."

  - id: import_ai
    nombre: "Import AI"
    feed: "https://importai.substack.com/feed"
    sitio: "https://importai.substack.com"
    temas: [ia]
    tipo: voz
    idioma: en
    volumen: bajo
    resumir: true
    porque: "Jack Clark lee los papers que nadie lee y explica por qué importan. Perspectiva de política pública."

  - id: interconnects
    nombre: "Interconnects"
    feed: "https://www.interconnects.ai/feed"
    sitio: "https://www.interconnects.ai"
    temas: [ia]
    tipo: voz
    idioma: en
    volumen: bajo
    resumir: true
    porque: "Nathan Lambert es de los pocos que explica el entrenamiento de modelos desde adentro."

  - id: openai_news
    nombre: "OpenAI"
    feed: "https://openai.com/news/rss.xml"
    sitio: "https://openai.com"
    temas: [ia]
    tipo: primaria
    idioma: en
    volumen: bajo
    resumir: true
    porque: "La fuente original. Sin intermediario que exagere o malinterprete el anuncio."

  - id: deepmind
    nombre: "Google DeepMind"
    feed: "https://deepmind.google/discover/blog/feed/"
    sitio: "https://deepmind.google"
    temas: [ia]
    tipo: primaria
    idioma: en
    volumen: bajo
    resumir: true
    porque: "Fuente original del laboratorio con más investigación publicada."

  - id: hf_blog
    nombre: "Hugging Face"
    feed: "https://huggingface.co/blog/feed.xml"
    sitio: "https://huggingface.co"
    temas: [ia]
    tipo: primaria
    idioma: en
    volumen: medio
    resumir: true
    max: 10
    porque: "Donde aterriza el open source. Lo que se puede correr uno mismo, no solo lo que se anuncia."

  - id: mit_tech_review
    nombre: "MIT Technology Review"
    feed: "https://www.technologyreview.com/feed/"
    sitio: "https://www.technologyreview.com"
    temas: [ia]
    tipo: medio
    idioma: en
    volumen: medio
    resumir: true
    porque: "El único medio grande que cubre IA sin caer en hype ni en pánico."

  # ==========================================================
  # MÉXICO — Aquí la POSTURA es obligatoria, y la regla de
  # diversidad manda: nunca cinco medios de la misma línea.
  # ==========================================================
  - id: animal_politico
    nombre: "Animal Político"
    feed: "https://news.google.com/rss/search?q=site:animalpolitico.com&hl=es-419&gl=MX&ceid=MX:es-419"
    sitio: "https://www.animalpolitico.com"
    temas: [mexico]
    tipo: medio
    idioma: es
    region: mx
    postura: critica-gobierno
    volumen: alto
    resumir: true
    max: 10
    porque: "Periodismo de datos y verificación. Vía Google News porque bloquea lectores RSS."

  - id: el_universal
    nombre: "El Universal"
    feed: "https://www.eluniversal.com.mx/arc/outboundfeeds/rss/?outputType=xml"
    sitio: "https://www.eluniversal.com.mx"
    temas: [mexico]
    tipo: medio
    idioma: es
    region: mx
    postura: centro
    volumen: alto
    resumir: true
    max: 10
    porque: "Cobertura amplia y establecida. Es la línea base contra la que se contrastan los demás."

  - id: el_financiero
    nombre: "El Financiero"
    sitio: "https://www.elfinanciero.com.mx"
    temas: [mexico, negocios]
    tipo: medio
    idioma: es
    region: mx
    postura: centro-derecha
    volumen: alto
    resumir: true
    max: 10
    porque: "El mejor ángulo económico y de mercados en México."

  - id: aristegui
    nombre: "Aristegui Noticias"
