  # ==========================================================
  - id: alerta_miel_fraude
    nombre: "Miel: adulteración"
    tipo: alerta
    query: 'miel (adulteración OR fraude OR autenticidad OR pureza)'
    temas: [alimentos, apicola]
    idioma: es
    region: mx
    resumir: true
    autor: cesar
    porque: "Vigila el fraude de miel en toda la prensa. Ninguna fuente única lo cubre."

  - id: alerta_regulacion_alimentos
    nombre: "Regulación alimentaria MX"
    tipo: alerta
    query: '(SENASICA OR COFEPRIS OR "NOM-051" OR etiquetado) alimentos'
    temas: [alimentos]
    idioma: es
    region: mx
    resumir: true
    autor: cesar
    porque: "Cambios normativos que pueden obligar a rehacer una etiqueta."

  - id: alerta_amazon_mx
    nombre: "Amazon México"
    tipo: alerta
    query: '"Amazon México" (FBA OR tarifas OR vendedores OR políticas)'
    temas: [negocios]
    idioma: es
    region: mx
    resumir: true
    autor: cesar
    porque: "Cambios de tarifas y política de Amazon MX antes de que te peguen."

  - id: alerta_export_miel
    nombre: "Exportación de miel"
    tipo: alerta
    query: '("miel mexicana" OR "exportación de miel") (Canadá OR "Estados Unidos" OR aranceles OR CFIA OR FDA)'
