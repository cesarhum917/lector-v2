<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0f10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lector</title>
<style>
:root{--bg:#0f0f10;--card:#191919;--line:#2a2a2c;--tx:#e8e6e3;--dim:#8a8a8f;--hot:#e0a83a;--bad:#e05a4d}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:0 0 60px;-webkit-text-size-adjust:100%}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

header{position:sticky;top:0;background:rgba(15,15,16,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));z-index:9;display:flex;align-items:center;gap:12px}
h1{font-size:17px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.meta{color:var(--dim);font-size:12px;margin-top:3px}
#hdr-tx{flex:1;min-width:0}
#btn-ajustes{color:var(--dim);border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:12px;flex:none}
#btn-ajustes:hover{color:var(--tx);border-color:var(--dim)}

#filtros-wrap{border-bottom:1px solid var(--line);padding-bottom:10px}
.filtros{display:flex;gap:6px;overflow-x:auto;padding:8px 18px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.chip{color:var(--dim);font-size:12px;white-space:nowrap;padding:5px 11px;border:1px solid var(--line);border-radius:20px;display:inline-flex;align-items:center;gap:6px;flex:none}
.chip:hover{color:var(--tx);border-color:var(--dim)}
.chip.on{color:var(--tx);border-color:var(--tx)}
.chip b{font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;flex:none}

main{max-width:760px;margin:0 auto;padding:0 18px}
section{margin-top:34px}
h2{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);padding-bottom:9px;border-bottom:1px solid var(--line);margin-bottom:6px;scroll-margin-top:150px;display:flex;align-items:center;gap:8px}
article{padding:14px 0;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:flex-start}
.cuerpo{flex:1;min-width:0}
article a.tit{color:var(--tx);text-decoration:none;font-weight:600;font-size:15.5px;line-height:1.4;display:block}
article a.tit:hover{color:var(--hot)}
.sum{color:var(--dim);font-size:14px;margin-top:5px}
.tags{margin-top:7px;font-size:11px;color:var(--dim);display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.src{color:var(--dim);display:inline-flex;align-items:center;gap:5px;padding:0}
.src:hover{color:var(--tx);text-decoration:underline dotted}
.ico{width:14px;height:14px;border-radius:3px;background:var(--line);flex:none}
.hot{color:var(--hot);font-weight:600}
.chip-mini{border:1px solid var(--line);border-radius:4px;padding:0 5px}
.postura,.fin{border:1px dotted var(--dim);border-radius:4px;padding:0 5px;font-style:italic;font-size:inherit;color:inherit}
.postura:hover,.fin:hover{color:var(--tx);border-color:var(--tx)}
.vthumb{position:relative;flex:none;margin-top:2px}
.vthumb .thumb{width:128px;height:72px;margin:0}
.vthumb i{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-style:normal;font-size:12px;pointer-events:none}
.dupes{font-size:11px;color:var(--dim);margin-top:5px}
.dupes a{color:var(--dim);text-decoration:underline}
.thumb{width:92px;height:64px;object-fit:cover;border-radius:6px;background:var(--card);flex:none;margin-top:2px}
.vacio{color:var(--dim);text-align:center;padding:60px 20px;font-size:14px}
footer{text-align:center;color:var(--dim);font-size:12px;margin-top:44px}

/* ---------- panel (onboarding + ajustes) ---------- */
#panel{position:fixed;inset:0;background:rgba(15,15,16,.97);z-index:20;overflow-y:auto;display:none;padding:26px 18px 110px}
#panel.on{display:block}
.panel-in{max-width:560px;margin:0 auto}
#panel h2{border:none;color:var(--tx);font-size:19px;text-transform:none;letter-spacing:0;margin-bottom:6px;padding:0}
#panel h3{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:26px 0 10px}
#panel .sub{color:var(--dim);font-size:13px;margin-bottom:22px}
.paq{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;width:100%;text-align:left;padding:14px;display:flex;gap:12px;align-items:flex-start}
.paq.on{border-color:var(--hot)}
.marca{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--dim);flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:#111;margin-top:1px}
.paq.on .marca{background:var(--hot);border-color:var(--hot)}
.paq-tx{flex:1;min-width:0}
.paq-tx b{font-size:14.5px;display:block}
.paq-tx p{color:var(--dim);font-size:12.5px;margin-top:3px}
.paq-meta{color:var(--dim);font-size:11px;margin-top:7px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.fte{display:flex;align-items:flex-start;gap:9px;padding:10px 2px;font-size:13px;border-bottom:1px solid var(--line)}
.fte img{width:15px;height:15px;border-radius:3px;background:var(--line);flex:none;margin-top:2px}
.fte-tx{flex:1;min-width:0}
.fte-tx b{font-weight:600;display:block}
.fte-tx .fmeta{color:var(--dim);font-size:11px;margin-top:1px}
.fte-tx .porque{color:var(--dim);font-size:11.5px;margin-top:3px;font-style:italic}
.fte.off .fte-tx b{color:var(--dim);text-decoration:line-through}
.sw{width:34px;height:20px;border-radius:20px;background:var(--line);position:relative;flex:none;margin-top:4px;transition:.15s}
.sw:after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--dim);transition:.15s}
.fte:not(.off) .sw{background:var(--hot)}
.fte:not(.off) .sw:after{left:16px;background:#111}
#panel-pie{position:fixed;left:0;right:0;bottom:0;background:rgba(15,15,16,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:14px 18px calc(14px + env(safe-area-inset-bottom))}
#panel-ok{display:block;max-width:560px;margin:0 auto;width:100%;background:var(--hot);color:#111;font-weight:600;font-size:15px;border-radius:10px;padding:13px}
#panel-ok:disabled{background:var(--line);color:var(--dim);cursor:default}

/* ---------- nota explicativa (postura / financiamiento) ---------- */
#nota{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);padding:18px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(105%);transition:.2s;box-shadow:0 -8px 30px rgba(0,0,0,.5)}
#nota.on{transform:none}
#nota b{display:block;font-size:14.5px;margin-bottom:5px;max-width:560px;margin-left:auto;margin-right:auto}
#nota p{color:var(--dim);font-size:13.5px;line-height:1.5;max-width:560px;margin:0 auto}
#nota .cerrar{position:absolute;top:10px;right:14px;color:var(--dim);font-size:18px;padding:4px 8px}
</style>
</head>
<body>

<header>
  <div id="hdr-tx"><h1>Lector</h1><div class="meta" id="hdr-meta">Cargando…</div></div>
  <button id="btn-ajustes">Ajustes</button>
</header>
<div id="filtros-wrap">
  <div class="filtros" id="f-temas"></div>
  <div class="filtros" id="f-tipos"></div>
  <div class="filtros" id="f-fin" style="display:none"></div>
</div>
<main id="main"><div class="vacio">Cargando datos…</div></main>
<div id="nota"><button class="cerrar">✕</button><b id="nota-tit"></b><p id="nota-tx"></p></div>

<div id="panel">
  <div class="panel-in">
    <h2 id="panel-tit"></h2>
    <p class="sub" id="panel-sub"></p>
    <div id="panel-cuerpo"></div>
  </div>
  <div id="panel-pie"><button id="panel-ok"></button></div>
</div>

<script src="motor.js"></script>
<script>
'use strict';
const LS = 'lector.prefs';

let D = null;               // datos.json
let P = null;               // preferencias del usuario (localStorage)
let filtroTema = null;      // filtros del muro (efimeros, no se guardan)
let filtroTipo = null;
let filtroFin = null;       // tercer eje: quien paga al medio
let TEMAS, FUENTES, TIPONOM, FINS;

// etiqueta corta del financiamiento para los chips de las notas
const FIN_CORTO = { lectores: 'lectores', publico_extranjero: 'público ext.',
  fundacion: 'fundación', anuncios: 'anuncios', estatal_local: 'estatal',
  corporativo: 'corporativo' };

const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $ = id => document.getElementById(id);
const favicon = dom => dom
  ? `<img class="ico" loading="lazy" alt="" src="https://www.google.com/s2/favicons?sz=32&domain=${esc(dom)}">`
  : '<span class="ico"></span>';

// ---------- preferencias (SOLO preferencias; los datos vienen de datos.json)
function cargarPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem(LS));
    if (p && p.v === 2) return p;
  } catch (e) {}
  return { v: 2, paquetes: [], fuentesOcultas: [], onboarded: false };
}
const guardarPrefs = () => localStorage.setItem(LS, JSON.stringify(P));

// ---------- utilidades
function cuando(iso) {
  const t = new Date(iso);
  if (isNaN(t)) return '';
  const m = (Date.now() - t.getTime()) / 60000;
  if (m < 60) return `hace ${Math.max(1, m | 0)} min`;
  if (m < 1440) return `hace ${(m / 60) | 0} h`;
  if (m < 2880) return 'ayer';
  return t.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
}
const minutos = seg => `${Math.max(1, Math.round(seg / 60))} min`;

// ---------- el paquete es una CONSULTA sobre el catalogo, no una lista fija.
// Ejes: temas, tipos, financiamiento, idioma. Si un eje se omite = "cualquiera".
// Los paquetes de arranque solo resuelven fuentes esenciales; el resto del
// catalogo queda para el explorador del frontend futuro (TAREAS-v2, fase 6).
// Excepcion: los paquetes de formato (todo_el_catalogo: true) no filtran.
const cumpleConsulta = (f, paq) =>
  (paq.todo_el_catalogo || f.esencial) &&
  (!paq.tipos || paq.tipos.includes(f.tipo)) &&
  (!paq.temas || f.temas.some(t => paq.temas.includes(t))) &&
  (!paq.idioma || f.idioma === paq.idioma) &&
  (!paq.financiamiento || paq.financiamiento.includes(f.financiamiento));

function fuentesActivas() {
  const ids = new Set();
  for (const pid of P.paquetes) {
    const paq = D.paquetes.find(p => p.id === pid);
    if (!paq) continue;
    for (const f of D.fuentes) if (cumpleConsulta(f, paq)) ids.add(f.id);
  }
  for (const oc of P.fuentesOcultas) ids.delete(oc);
  return ids;
}
// temas visibles = los que PIDIERON tus paquetes (no todos los temas de las
// fuentes arrastradas: el_financiero entra por mexico, no te suscribe a negocios)
function temasActivos(activas) {
  const pedidos = new Set();
  for (const pid of P.paquetes) {
    const paq = D.paquetes.find(p => p.id === pid);
    if (!paq) continue;
    if (paq.temas) paq.temas.forEach(t => pedidos.add(t));
    else  // paquete sin temas (ej. "escuchar"): pide los temas de sus fuentes
      for (const f of D.fuentes)
        if (cumpleConsulta(f, paq)) f.temas.forEach(t => pedidos.add(t));
  }
  return D.temas.filter(t => pedidos.has(t.id)
    && [...activas].some(id => FUENTES.get(id).temas.includes(t.id)));
}
const tiposActivos = activas =>
  D.tipos.filter(t => [...activas].some(id => FUENTES.get(id).tipo === t.id));
// "na" (voz personal, primaria, agregador) no es un filtro ni un chip: se omite
const finsActivos = activas =>
  (D.financiamientos || []).filter(x => x.id !== 'na' &&
    [...activas].some(id => FUENTES.get(id).financiamiento === x.id));

// ---------- seleccion + agrupado: vive en motor.js (probado por test_motor.js)
function gruposDeTema(temaId, activas, exclusivo) {
  return Motor.gruposDeTema({
    articulos: D.articulos, fuentes: FUENTES, temaId, activas,
    temasOn: new Set(temasActivos(activas).map(t => t.id)),
    filtroTipo, filtroFin, exclusivo,
  });
}

// ---------- nota explicativa (que significa la etiqueta que tocaste)
function verNota(titulo, texto) {
  $('nota-tit').textContent = titulo;
  $('nota-tx').textContent = texto;
  $('nota').classList.add('on');
}
$('nota').addEventListener('click', () => $('nota').classList.remove('on'));

function htmlArticulo(grupo) {
  const a = grupo[0];
  const f = FUENTES.get(a.fuente);
  const hot = (f.resumida && (a.relevancia || 0) >= 8)
    ? ' <span class="hot">● alta</span>' : '';
  const tag = a.etiqueta ? `<span>${esc(a.etiqueta)}</span>` : '';
  const sum = a.resumen ? `<div class="sum">${esc(a.resumen)}</div>` : '';
  const esVideoConThumb = f.tipo === 'video' && a.imagen;
  const chipTipo = f.tipo === 'video'
    ? (esVideoConThumb ? '' : '<span class="chip-mini">▶ video</span>')
    : f.tipo === 'podcast'
      ? `<span class="chip-mini">🎧${a.duracion ? ' ' + minutos(a.duracion) : ' podcast'}</span>`
      : f.tipo !== 'medio'
        ? `<span class="chip-mini">${esc(TIPONOM.get(f.tipo) || f.tipo).toLowerCase()}</span>` : '';
  // postura y financiamiento declarados, no "objetividad" (tocables: explican
  // que significa la etiqueta). Ver CATALOGO.md.
  const postura = f.postura
    ? `<button class="postura" data-fte="${esc(f.id)}" title="¿Qué significa?">${esc(f.postura)}</button>` : '';
  const fin = (f.financiamiento && f.financiamiento !== 'na')
    ? `<button class="fin" data-fin="${esc(f.financiamiento)}" title="¿Quién paga este medio?">${esc(FIN_CORTO[f.financiamiento] || f.financiamiento)}</button>` : '';
  const thumb = a.imagen
    ? (esVideoConThumb
       ? `<span class="vthumb"><img class="thumb" loading="lazy" alt="" src="${esc(a.imagen)}" onerror="this.parentElement.remove()"><i>▶</i></span>`
       : `<img class="thumb" loading="lazy" alt="" src="${esc(a.imagen)}" onerror="this.remove()">`) : '';

  let dupes = '';
  if (grupo.length > 1) {
    const otros = grupo.slice(1, 4).map(m =>
      `<a href="${esc(m.url)}" target="_blank" rel="noopener">${esc(m.medio || m.fuente)}</a>`);
    dupes = `<div class="dupes">También en: ${otros.join(' · ')}</div>`;
  }

  return `<article>
    <div class="cuerpo">
      <a class="tit" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.titulo)}</a>${sum}
      <div class="tags">
        <button class="src" data-fte="${esc(a.fuente)}"
          title="Ocultar esta fuente">${favicon(a.dominio)}${esc(a.medio || a.fuente)}</button>
        ${chipTipo}${postura}${fin}${tag}${hot}<span>${cuando(a.publicado)}</span>
      </div>${dupes}
    </div>${thumb}
  </article>`;
}

// ---------- render principal
function render() {
  const activas = fuentesActivas();
  const temas = temasActivos(activas);
  const tipos = tiposActivos(activas);
  const fins = finsActivos(activas);
  if (filtroTema && !temas.some(t => t.id === filtroTema)) filtroTema = null;
  if (filtroTipo && !tipos.some(t => t.id === filtroTipo)) filtroTipo = null;
  if (filtroFin && !fins.some(x => x.id === filtroFin)) filtroFin = null;

  // tres filtros combinables: TEMA x TIPO x QUIEN PAGA
  $('f-temas').innerHTML = [`<button class="chip ${!filtroTema ? 'on' : ''}" data-tema="">Todo</button>`]
    .concat(temas.map(t =>
      `<button class="chip ${filtroTema === t.id ? 'on' : ''}" data-tema="${esc(t.id)}">
        <span class="dot" style="background:${esc(t.color)}"></span>${esc(t.nombre)}</button>`))
    .join('');
  $('f-tipos').innerHTML = [`<button class="chip ${!filtroTipo ? 'on' : ''}" data-tipo="">Todo tipo</button>`]
    .concat(tipos.map(t =>
      `<button class="chip ${filtroTipo === t.id ? 'on' : ''}" data-tipo="${esc(t.id)}">${esc(t.nombre)}</button>`))
    .join('');
  // la barra "quien paga" solo aparece si tu suscripcion tiene medios con
  // financiamiento declarado. Nadie mas deja filtrar prensa por esto.
  $('f-fin').style.display = fins.length ? '' : 'none';
  $('f-fin').innerHTML = fins.length
    ? [`<button class="chip ${!filtroFin ? 'on' : ''}" data-fin="">Quién paga · todos</button>`]
        .concat(fins.map(x =>
          `<button class="chip ${filtroFin === x.id ? 'on' : ''}" data-fin="${esc(x.id)}">${esc(x.nombre)}</button>`))
        .join('')
    : '';

  let total = 0;
  const bloques = [];
  const aMostrar = filtroTema ? temas.filter(t => t.id === filtroTema) : temas;
  for (const tema of aMostrar) {
    const grupos = gruposDeTema(tema.id, activas, !filtroTema);
    if (!grupos.length) continue;
    total += grupos.length;
    bloques.push(`<section id="${esc(tema.id)}">
      <h2><span class="dot" style="background:${esc(tema.color)}"></span>${esc(tema.nombre)} (${grupos.length})</h2>
      ${grupos.map(htmlArticulo).join('')}
    </section>`);
  }

  $('hdr-meta').textContent = `${total} historias · actualizado ${cuando(D.generado)}`;
  $('main').innerHTML = bloques.join('')
    || `<div class="vacio">${P.paquetes.length
        ? 'Nada con estos filtros. Prueba con "Todo", o revisa Ajustes.'
        : 'No tienes paquetes elegidos. Abre Ajustes para escoger.'}</div>`;
  $('main').insertAdjacentHTML('beforeend',
    '<footer>Lector · lee menos, entérate igual</footer>');
}

// filtros del muro
$('f-temas').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  filtroTema = c.dataset.tema || null; render();
});
$('f-tipos').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  filtroTipo = c.dataset.tipo || null; render();
});
$('f-fin').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  filtroFin = c.dataset.fin || null; render();
});

$('main').addEventListener('click', e => {
  // etiquetas tocables: explican que significan (CATALOGO.md)
  const pos = e.target.closest('.postura');
  if (pos) {
    const f = FUENTES.get(pos.dataset.fte);
    verNota(`Postura: ${f.postura}`,
      `Línea editorial declarada de ${f.nombre}. Es una etiqueta descriptiva, no un juicio de calidad: en temas políticos no hay árbitro neutral, así que la declaramos y tú decides.`);
    return;
  }
  const fin = e.target.closest('.fin');
  if (fin) {
    const x = FINS.get(fin.dataset.fin);
    if (x) verNota(`Financiamiento: ${x.nombre}`, x.nota || '');
    return;
  }
  // Ocultar fuente con un toque en su etiqueta (global, en todos los temas)
  const btn = e.target.closest('.src');
  if (!btn) return;
  const f = FUENTES.get(btn.dataset.fte);
  if (!confirm(`¿Ocultar "${f.nombre}"?\nPuedes reactivarla en Ajustes.`)) return;
  if (!P.fuentesOcultas.includes(f.id)) P.fuentesOcultas.push(f.id);
  guardarPrefs();
  render();
});

// ---------- panel: onboarding y ajustes comparten UI
let onboarding = false;

function htmlPaquete(paq) {
  const on = P.paquetes.includes(paq.id);
  const n = D.fuentes.filter(f => cumpleConsulta(f, paq)).length;
  const dots = (paq.temas || []).map(tid => {
    const t = TEMAS.get(tid);
    return t ? `<span class="dot" style="background:${esc(t.color)}" title="${esc(t.nombre)}"></span>` : '';
  }).join('');
  const ejes = [(paq.tipos || []).map(t => (TIPONOM.get(t) || t).toLowerCase()).join(' + ')
                || 'todos los tipos'];
  if (paq.financiamiento)
    ejes.push(paq.financiamiento.map(x => FIN_CORTO[x] || x).join('/'));
  if (paq.idioma) ejes.push(paq.idioma === 'es' ? 'en español' : 'en inglés');
  const tipos = ejes.join(' · ');
  return `<button class="paq ${on ? 'on' : ''}" data-paq="${esc(paq.id)}">
    <span class="marca">${on ? '✓' : ''}</span>
    <span class="paq-tx"><b>${esc(paq.nombre)}</b><p>${esc(paq.descripcion)}</p>
      <span class="paq-meta">${dots} ${esc(tipos)} · ${n} fuentes hoy</span>
    </span>
  </button>`;
}

function pintarPanel() {
  let html = D.paquetes.map(htmlPaquete).join('');

  if (!onboarding) {
    // gestion de fuentes: la suscripcion resuelta HOY por tus paquetes,
    // mas las que hayas ocultado (para poder reactivarlas)
    const enPaquetes = new Set();
    for (const pid of P.paquetes) {
      const paq = D.paquetes.find(p => p.id === pid);
      if (paq) for (const f of D.fuentes) if (cumpleConsulta(f, paq)) enPaquetes.add(f.id);
    }
    for (const oc of P.fuentesOcultas) enPaquetes.add(oc);
    const lista = D.fuentes.filter(f => enPaquetes.has(f.id));
    if (lista.length) {
      html += `<h3>Tus fuentes (${lista.length})</h3>`;
      html += lista.map(f => {
        const off = P.fuentesOcultas.includes(f.id);
        const temas = f.temas.map(t => TEMAS.get(t)?.nombre || t).join(', ');
        const meta = [TIPONOM.get(f.tipo) || f.tipo, temas, f.postura,
                      f.financiamiento && f.financiamiento !== 'na'
                        && (FIN_CORTO[f.financiamiento] || f.financiamiento)]
                     .filter(Boolean).join(' · ');
        return `<div class="fte ${off ? 'off' : ''}" data-fte="${esc(f.id)}">
          ${favicon(f.dominio)}
          <span class="fte-tx"><b>${esc(f.nombre)}</b>
            <span class="fmeta">${esc(meta)}</span>
            ${f.porque ? `<span class="porque">${esc(f.porque)}</span>` : ''}
          </span><span class="sw"></span>
        </div>`;
      }).join('');
    }
  }
  $('panel-cuerpo').innerHTML = html;
  $('panel-ok').disabled = onboarding && !P.paquetes.length;
}

function abrirPanel(esOnboarding) {
  onboarding = esOnboarding;
  $('panel-tit').textContent = esOnboarding ? '¿Qué quieres leer?' : 'Ajustes';
  $('panel-sub').textContent = esOnboarding
    ? 'Elige uno o más paquetes. Cada paquete es una consulta viva sobre el catálogo: cuando entren fuentes nuevas que le queden, las verás sin hacer nada. Todo se guarda solo en este navegador.'
    : 'Activa o desactiva paquetes, y apaga fuentes específicas. El paquete es una consulta: las fuentes nuevas del catálogo entran solas.';
  $('panel-ok').textContent = esOnboarding ? 'Empezar a leer' : 'Listo';
  pintarPanel();
  $('panel').classList.add('on');
}

$('panel-cuerpo').addEventListener('click', e => {
  const paq = e.target.closest('.paq');
  if (paq) {
    const i = P.paquetes.indexOf(paq.dataset.paq);
    i >= 0 ? P.paquetes.splice(i, 1) : P.paquetes.push(paq.dataset.paq);
    guardarPrefs();
    pintarPanel();
    return;
  }
  const fte = e.target.closest('.fte');
  if (fte) {
    const i = P.fuentesOcultas.indexOf(fte.dataset.fte);
    i >= 0 ? P.fuentesOcultas.splice(i, 1) : P.fuentesOcultas.push(fte.dataset.fte);
    guardarPrefs();
    pintarPanel();
  }
});

$('panel-ok').addEventListener('click', () => {
  if (onboarding) { P.onboarded = true; guardarPrefs(); }
  $('panel').classList.remove('on');
  render();
});
$('btn-ajustes').addEventListener('click', () => abrirPanel(false));

// ---------- arranque
async function init() {
  P = cargarPrefs();
  try {
    const r = await fetch('datos.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    D = await r.json();
    if (D.schema !== 2) throw new Error('schema ' + D.schema);
  } catch (e) {
    $('hdr-meta').textContent = 'error';
    $('main').innerHTML = `<div class="vacio">No pude cargar datos.json (${esc(e.message)}).<br>
      Si abriste el archivo directo desde el disco, sírvelo con un servidor local:<br>
      <code>python -m http.server</code></div>`;
    return;
  }
  TEMAS = new Map(D.temas.map(t => [t.id, t]));
  FUENTES = new Map(D.fuentes.map(f => [f.id, f]));
  TIPONOM = new Map(D.tipos.map(t => [t.id, t.nombre]));
  FINS = new Map((D.financiamientos || []).map(x => [x.id, x]));

  // depurar preferencias que ya no existen en el catalogo
  P.paquetes = P.paquetes.filter(id => D.paquetes.some(p => p.id === id));
  P.fuentesOcultas = P.fuentesOcultas.filter(id => FUENTES.has(id));

  if (!P.onboarded) abrirPanel(true);
  else render();
}
init();
</script>
