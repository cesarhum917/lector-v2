<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0f10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lector</title>
<style>
:root{--bg:#0f0f10;--card:#191919;--line:#2a2a2c;--tx:#e8e6e3;--dim:#8a8a8f;--hot:#e0a83a;--bad:#e05a4d}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:0 0 60px;-webkit-text-size-adjust:100%}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

header{position:sticky;top:0;background:rgba(15,15,16,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));z-index:9;display:flex;align-items:center;gap:12px}
h1{font-size:17px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.meta{color:var(--dim);font-size:12px;margin-top:3px}
#hdr-tx{flex:1;min-width:0}
#btn-ajustes{color:var(--dim);border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:12px;flex:none}
#btn-ajustes:hover{color:var(--tx);border-color:var(--dim)}

nav{display:flex;gap:6px;overflow-x:auto;padding:10px 18px;border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav a{color:var(--dim);text-decoration:none;font-size:12px;white-space:nowrap;padding:5px 11px;border:1px solid var(--line);border-radius:20px}
nav a:hover{color:var(--tx);border-color:var(--dim)}
nav a b{color:var(--tx);font-weight:600}

main{max-width:760px;margin:0 auto;padding:0 18px}
section{margin-top:34px}
h2{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);padding-bottom:9px;border-bottom:1px solid var(--line);margin-bottom:6px;scroll-margin-top:120px}
article{padding:14px 0;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:flex-start}
.cuerpo{flex:1;min-width:0}
article a.tit{color:var(--tx);text-decoration:none;font-weight:600;font-size:15.5px;line-height:1.4;display:block}
article a.tit:hover{color:var(--hot)}
.sum{color:var(--dim);font-size:14px;margin-top:5px}
.tags{margin-top:7px;font-size:11px;color:var(--dim);display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.src{color:var(--dim);display:inline-flex;align-items:center;gap:5px;padding:0;border-radius:4px}
.src:hover{color:var(--tx);text-decoration:underline dotted}
.ico{width:14px;height:14px;border-radius:3px;background:var(--line);flex:none}
.hot{color:var(--hot);font-weight:600}
.chip-tipo{border:1px solid var(--line);border-radius:4px;padding:0 5px}
.dupes{font-size:11px;color:var(--dim);margin-top:5px}
.dupes a{color:var(--dim);text-decoration:underline}
.thumb{width:92px;height:64px;object-fit:cover;border-radius:6px;background:var(--card);flex:none;margin-top:2px}
.vacio{color:var(--dim);text-align:center;padding:60px 20px;font-size:14px}
footer{text-align:center;color:var(--dim);font-size:12px;margin-top:44px}

/* ---------- panel (onboarding + ajustes) ---------- */
#panel{position:fixed;inset:0;background:rgba(15,15,16,.97);z-index:20;overflow-y:auto;display:none;padding:26px 18px 110px}
#panel.on{display:block}
.panel-in{max-width:560px;margin:0 auto}
#panel h2{border:none;color:var(--tx);font-size:19px;text-transform:none;letter-spacing:0;margin-bottom:6px;padding:0}
#panel .sub{color:var(--dim);font-size:13px;margin-bottom:22px}
.sec-card{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-card.on{border-color:var(--hot)}
.sec-head{display:flex;align-items:center;gap:11px;width:100%;padding:13px 14px;text-align:left}
.marca{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--dim);flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:#111}
.sec-card.on .marca{background:var(--hot);border-color:var(--hot)}
.sec-nom{flex:1;min-width:0;font-weight:600;font-size:14.5px}
.sec-n{color:var(--dim);font-size:11.5px;font-weight:400;flex:none}
.sec-card details{border-top:1px solid var(--line)}
.sec-card summary{color:var(--dim);font-size:12px;padding:9px 14px;cursor:pointer;list-style:none}
.sec-card summary::-webkit-details-marker{display:none}
.sec-card summary:before{content:"▸ "}
.sec-card details[open] summary:before{content:"▾ "}
.fte{display:flex;align-items:center;gap:9px;padding:7px 14px;font-size:13px}
.fte img{width:15px;height:15px;border-radius:3px;background:var(--line);flex:none}
.fte span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fte.off span{color:var(--dim);text-decoration:line-through}
.sw{width:34px;height:20px;border-radius:20px;background:var(--line);position:relative;flex:none;transition:.15s}
.sw:after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--dim);transition:.15s}
.fte:not(.off) .sw{background:var(--hot)}
.fte:not(.off) .sw:after{left:16px;background:#111}
#panel-pie{position:fixed;left:0;right:0;bottom:0;background:rgba(15,15,16,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:14px 18px calc(14px + env(safe-area-inset-bottom))}
#panel-ok{display:block;max-width:560px;margin:0 auto;width:100%;background:var(--hot);color:#111;font-weight:600;font-size:15px;border-radius:10px;padding:13px}
#panel-ok:disabled{background:var(--line);color:var(--dim);cursor:default}
</style>
</head>
<body>

<header>
  <div id="hdr-tx"><h1>Lector</h1><div class="meta" id="hdr-meta">Cargando…</div></div>
  <button id="btn-ajustes">Ajustes</button>
</header>
<nav id="nav"></nav>
<main id="main"><div class="vacio">Cargando datos…</div></main>

<div id="panel">
  <div class="panel-in">
    <h2 id="panel-tit"></h2>
    <p class="sub" id="panel-sub"></p>
    <div id="panel-secs"></div>
  </div>
  <div id="panel-pie"><button id="panel-ok"></button></div>
</div>

<script>
'use strict';
const LS = 'lector.prefs';
let D = null;   // datos.json
let P = null;   // preferencias del usuario (localStorage)

const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $ = id => document.getElementById(id);
const favicon = dom => dom
  ? `<img class="ico" loading="lazy" alt="" src="https://www.google.com/s2/favicons?sz=32&domain=${esc(dom)}">`
  : '<span class="ico"></span>';

// ---------- preferencias (SOLO preferencias; los datos vienen de datos.json)
function cargarPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem(LS));
    if (p && p.v === 1) return p;
  } catch (e) {}
  return { v: 1, secciones: [], fuentesOcultas: {}, onboarded: false };
}
const guardarPrefs = () => localStorage.setItem(LS, JSON.stringify(P));

// ---------- utilidades
function cuando(iso) {
  const t = new Date(iso);
  if (isNaN(t)) return '';
  const m = (Date.now() - t.getTime()) / 60000;
  if (m < 60) return `hace ${Math.max(1, m | 0)} min`;
  if (m < 1440) return `hace ${(m / 60) | 0} h`;
  if (m < 2880) return 'ayer';
  return t.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
}
const minutos = seg => `${Math.max(1, Math.round(seg / 60))} min`;
const nombreFuente = (sec, fid) =>
  (sec.fuentes.find(f => f.id === fid) || {}).nombre || fid;

// ---------- seleccion + agrupado (todo en el navegador)
function gruposDeSeccion(sec) {
  const ocultas = new Set(P.fuentesOcultas[sec.id] || []);
  let arts = D.articulos.filter(a => a.seccion === sec.id && !ocultas.has(a.fuente));
  if (sec.resumida && sec.defaults.min_relevancia)
    arts = arts.filter(a => (a.relevancia || 0) >= sec.defaults.min_relevancia);

  // Duplicados: se agrupan por cluster; el lider se decide AQUI, despues de
  // filtrar, porque puede cambiar si el usuario oculto la fuente del lider.
  const porCluster = {};
  for (const a of arts) (porCluster[a.cluster] ??= []).push(a);
  let grupos = Object.values(porCluster);
  for (const g of grupos)
    g.sort((x, y) => (y.relevancia || 0) - (x.relevancia || 0)
      || String(y.publicado).localeCompare(String(x.publicado)));

  grupos.sort((a, b) => sec.resumida
    ? ((b[0].relevancia || 0) - (a[0].relevancia || 0)
       || String(b[0].publicado).localeCompare(String(a[0].publicado)))
    : String(b[0].publicado).localeCompare(String(a[0].publicado)));

  // Tope por medio: evita que un medio prolifico inunde la seccion
  const tope = sec.defaults.max_por_fuente;
  if (tope) {
    const vistos = {};
    grupos = grupos.filter(g => {
      const k = g[0].medio || g[0].fuente;
      vistos[k] = (vistos[k] || 0) + 1;
      return vistos[k] <= tope;
    });
  }
  return grupos;
}

function htmlArticulo(sec, grupo) {
  const a = grupo[0];
  const hot = (a.relevancia || 0) >= 8 ? ' <span class="hot">● alta</span>' : '';
  const tag = a.etiqueta ? `<span>${esc(a.etiqueta)}</span>` : '';
  const sum = a.resumen ? `<div class="sum">${esc(a.resumen)}</div>` : '';
  const tipo = a.tipo === 'youtube' ? '<span class="chip-tipo">▶ video</span>'
    : a.tipo === 'podcast'
      ? `<span class="chip-tipo">🎧${a.duracion ? ' ' + minutos(a.duracion) : ''}</span>` : '';
  // onerror: varios medios bloquean hotlinking; mejor sin thumb que una caja rota
  const thumb = a.imagen
    ? `<img class="thumb" loading="lazy" alt="" src="${esc(a.imagen)}" onerror="this.remove()">` : '';

  let dupes = '';
  if (grupo.length > 1) {
    const otros = grupo.slice(1, 4).map(m =>
      `<a href="${esc(m.url)}" target="_blank" rel="noopener">${esc(m.medio || m.fuente)}</a>`);
    dupes = `<div class="dupes">También en: ${otros.join(' · ')}</div>`;
  }

  return `<article>
    <div class="cuerpo">
      <a class="tit" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.titulo)}</a>${sum}
      <div class="tags">
        <button class="src" data-sec="${esc(sec.id)}" data-fte="${esc(a.fuente)}"
          title="Ocultar esta fuente">${favicon(a.dominio)}${esc(a.medio || a.fuente)}</button>
        ${tipo}${tag}${hot}<span>${cuando(a.publicado)}</span>
      </div>${dupes}
    </div>${thumb}
  </article>`;
}

// ---------- render principal
function render() {
  const secs = D.secciones.filter(s => P.secciones.includes(s.id));
  let total = 0;
  const navH = [], bloques = [];

  for (const sec of secs) {
    const grupos = gruposDeSeccion(sec);
    if (!grupos.length) continue;
    total += grupos.length;
    navH.push(`<a href="#${esc(sec.id)}">${esc(sec.nombre)} <b>${grupos.length}</b></a>`);
    bloques.push(`<section id="${esc(sec.id)}">
      <h2>${esc(sec.nombre)} (${grupos.length})</h2>
      ${grupos.map(g => htmlArticulo(sec, g)).join('')}
    </section>`);
  }

  $('nav').innerHTML = navH.join('');
  $('hdr-meta').textContent =
    `${total} historias · actualizado ${cuando(D.generado)}`;
  $('main').innerHTML = bloques.join('')
    || `<div class="vacio">${secs.length
        ? 'Nada nuevo en tus secciones. Vuelve más tarde o revisa Ajustes.'
        : 'No tienes secciones elegidas. Abre Ajustes para escoger tus intereses.'}</div>`;
  $('main').insertAdjacentHTML('beforeend',
    '<footer>Lector · los datos se regeneran cada mañana</footer>');
}

// Ocultar fuente con un toque en la etiqueta de la fuente
$('main').addEventListener('click', e => {
  const btn = e.target.closest('.src');
  if (!btn) return;
  const sec = D.secciones.find(s => s.id === btn.dataset.sec);
  const nom = nombreFuente(sec, btn.dataset.fte);
  if (!confirm(`¿Ocultar "${nom}" en ${sec.nombre}?\nPuedes reactivarla en Ajustes.`)) return;
  (P.fuentesOcultas[sec.id] ??= []);
  if (!P.fuentesOcultas[sec.id].includes(btn.dataset.fte))
    P.fuentesOcultas[sec.id].push(btn.dataset.fte);
  guardarPrefs();
  render();
});

// ---------- panel: onboarding y ajustes comparten UI
let onboarding = false;

function pintarPanel() {
  $('panel-secs').innerHTML = D.secciones.map(sec => {
    const on = P.secciones.includes(sec.id);
    const ocultas = new Set(P.fuentesOcultas[sec.id] || []);
    const fuentes = sec.fuentes.map(f => `
      <div class="fte ${ocultas.has(f.id) ? 'off' : ''}" data-sec="${esc(sec.id)}" data-fte="${esc(f.id)}">
        ${favicon(f.dominio)}<span>${esc(f.nombre)}</span><span class="sw"></span>
      </div>`).join('');
    return `<div class="sec-card ${on ? 'on' : ''}" data-sec="${esc(sec.id)}">
      <button class="sec-head">
        <span class="marca">${on ? '✓' : ''}</span>
        <span class="sec-nom">${esc(sec.nombre)}</span>
        <span class="sec-n">${sec.fuentes.length} fuentes</span>
      </button>
      ${on ? `<details><summary>gestionar fuentes</summary>${fuentes}</details>` : ''}
    </div>`;
  }).join('');
  $('panel-ok').disabled = onboarding && !P.secciones.length;
}

function abrirPanel(esOnboarding) {
  onboarding = esOnboarding;
  $('panel-tit').textContent = esOnboarding ? '¿Qué quieres leer?' : 'Ajustes';
  $('panel-sub').textContent = esOnboarding
    ? 'Elige tus secciones. Todo se guarda solo en este navegador; puedes cambiarlo cuando quieras en Ajustes.'
    : 'Activa o desactiva secciones, y oculta fuentes dentro de cada una.';
  $('panel-ok').textContent = esOnboarding ? 'Empezar a leer' : 'Listo';
  pintarPanel();
  $('panel').classList.add('on');
}

$('panel-secs').addEventListener('click', e => {
  const fte = e.target.closest('.fte');
  if (fte) {  // toggle de fuente oculta
    const lista = (P.fuentesOcultas[fte.dataset.sec] ??= []);
    const i = lista.indexOf(fte.dataset.fte);
    i >= 0 ? lista.splice(i, 1) : lista.push(fte.dataset.fte);
    guardarPrefs();
    pintarPanel();
    // reabrir el details de esa seccion para no perder el lugar
    const card = $('panel-secs').querySelector(`.sec-card[data-sec="${CSS.escape(fte.dataset.sec)}"] details`);
    if (card) card.open = true;
    return;
  }
  const head = e.target.closest('.sec-head');
  if (head) {  // toggle de seccion
    const id = head.closest('.sec-card').dataset.sec;
    const i = P.secciones.indexOf(id);
    if (i >= 0) P.secciones.splice(i, 1);
    else {
      // insertar respetando el orden del catalogo
      P.secciones.push(id);
      const orden = D.secciones.map(s => s.id);
      P.secciones.sort((a, b) => orden.indexOf(a) - orden.indexOf(b));
    }
    guardarPrefs();
    pintarPanel();
  }
});

$('panel-ok').addEventListener('click', () => {
  if (onboarding) { P.onboarded = true; guardarPrefs(); }
  $('panel').classList.remove('on');
  render();
});
$('btn-ajustes').addEventListener('click', () => abrirPanel(false));

// ---------- arranque
async function init() {
  P = cargarPrefs();
  try {
    const r = await fetch('datos.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    D = await r.json();
  } catch (e) {
    $('hdr-meta').textContent = 'error';
    $('main').innerHTML = `<div class="vacio">No pude cargar datos.json (${esc(e.message)}).<br>
      Si abriste el archivo directo desde el disco, sírvelo con un servidor local:<br>
      <code>python -m http.server</code></div>`;
    return;
  }
  // depurar preferencias de secciones/fuentes que ya no existen en el catalogo
  const ids = new Set(D.secciones.map(s => s.id));
  P.secciones = P.secciones.filter(id => ids.has(id));
  for (const k of Object.keys(P.fuentesOcultas)) if (!ids.has(k)) delete P.fuentesOcultas[k];

  if (!P.onboarded) abrirPanel(true);
  else render();
}
init();
</script>
</body>
</html>
