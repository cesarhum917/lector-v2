# Pool compartido de fuentes. El backend ingesta la UNION de todo esto;
# cada usuario elige en el navegador que secciones y fuentes ver.
#
# Campos por fuente:
#   id:     slug estable. NO lo cambies una vez publicado: las preferencias
#           guardadas en los navegadores de los usuarios apuntan a este id.
#   nombre: etiqueta visible.
#   feed:   URL exacta del RSS (opcional si pones url:).
#   url:    URL del sitio; el script autodescubre el feed.
#   tipo:   rss (default) | youtube | podcast
#   max:    tope de items a ingerir por corrida (default 30).
